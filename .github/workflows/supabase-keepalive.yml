name: Supabase Keep-Alive

# Mantém o projeto Supabase ativo (o plano free pausa após ~7 dias sem
# atividade). Roda na infraestrutura do GitHub — independe de onde o site
# está hospedado.

on:
  schedule:
    - cron: "0 9 */2 * *" # a cada 2 dias, 09:00 UTC
  workflow_dispatch: {} # permite rodar manualmente em Actions → Run workflow

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          # A anon key é pública por design (já vai no front do site).
          # Se preferir, troque pelos secrets do repositório:
          #   SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          #   SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: "https://eivnmxrsyavilmslvwix.supabase.co"
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdm5teHJzeWF2aWxtc2x2d2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjYwMDIsImV4cCI6MjA5NDIwMjAwMn0.v8Gtqsh2FgX9rWWN2-ktuJiGM-s4oQpn-qmWbKH1JLg"
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/categories?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase respondeu HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "::error::Keep-alive falhou (HTTP $code)"
            exit 1
          fi
          echo "OK — projeto Supabase mantido ativo."
